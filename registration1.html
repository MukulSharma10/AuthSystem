<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="./assets/stylesheet.css">
</head>
<body>
    <div>
        <h1>Welcome to the Registration Page</h1>

        <input type="text" id="username" placeholder="Username"/>
        <br><br>
        <input type="text" id="email" placeholder="E-mail address">
        <br><br>
        <p id="status"></p>
        <br><br>
        <button id="submit">Submit</button>
        
    </div>

    <script>
        const statusText = document.getElementById('status')
        const submitBtn = document.getElementById('submit')
        const usernameInput = document.getElementById('username')
        const emailInput = document.getElementById('email')

        submitBtn.onclick = async () => {
            const username = usernameInput.value.trim()
            const email = emailInput.value.trim()

            if (!username) {
                statusText.innerText = 'Please enter a username.'
                return
            }

            const response = await fetch("http://localhost:3000/upload-details", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, email })
            })

            if (response.ok) {
                localStorage.setItem('username', username)
                statusText.innerText = 'User registered. Redirecting to the recording page...'

                setTimeout(() => {
                    window.location.href = `registration2.html?username=${encodeURIComponent(username)}`
                }, 800)
            } else {
                statusText.innerText = 'Registration failed. Please try again.'
            }
        }
    </script>
</body>
</html>
