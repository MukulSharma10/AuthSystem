<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Passphrase</title>
    <link rel="stylesheet" href="/assets/stylesheet.css">
</head>
<body>
    <div>
    <input type="text" id='user' placeholder="Username" autocomplete="off"/>
    <br><br>
    <button id="check-user">Send OTP</button>
    <p id="status"></p>
    <br><br><br>
    <input id="otp" type="text" autocomplete="off" placeholder="Enter OTP"/>
    <br><br>
    <button id="checkOTP" onclick="verifyOTP()">Submit</button>
    <p id="response"></p>
    </div>

    <script>
        const checkBtn = document.getElementById('check-user')
        const userInput = document.getElementById('user')
        const statusText = document.getElementById('status')
        const responseText = document.getElementById('response')
        
        let email

        checkBtn.onclick = async() =>{
            const username = userInput.value.trim()

            if(!username){
                alert("Enter a username!")
                return 
            }

            const res = await fetch("http://localhost:3000/find-email", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username})
            })

            const text = await res.text()

            if(text.includes("not")){
                statusText.innerText = "User does not exist! Enter a valid Username"
                return
            }

            email = text
            await generateOTP()
        }

        async function generateOTP() {
            if(!email){
                statusText.innerText = 'Please enter a valid username first'
                return
            }

            const response = await fetch('http://localhost:3000/generate-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email })
            })

            const result = await response.text()
            statusText.innerText = result
        }

        async function verifyOTP(){
            if(!email){
                responseText.innerText = 'Please generate an OTP first'
                return
            }

            const otp = document.getElementById('otp').value.trim()
            if(!otp){
                responseText.innerText = 'Enter the OTP before submitting'
                return
            }

            const response = await fetch('http://localhost:3000/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, otp })
            })

            const result = await response.text()
            responseText.innerText = result

            if (response.ok) {
                window.location.href = `newpass.html?email=${encodeURIComponent(email)}`
            }
        }

    </script>

</body>
</html>
