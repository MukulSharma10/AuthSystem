<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/assets/stylesheet.css">
</head>
<body>
    <div class="login">

    <h1>Login to your account</h1>
    <input type="text" id="username" placeholder="Enter username"/>
    <button id="check">Check</button>

    <p id="status"></p>
    <br><br>

    <label>Select Microphone:</label>
    <select id="micSelect"></select>
    <br><br>

    <button id="start">Start</button>
    <button id="rerecord" disabled>Re-record</button>
    <button id="login" disabled>Login</button>

    <br><br>

    <audio id="preview" controls controlsList="noplaybackrate"></audio>

    <br><br>

    <a href="/reset.html">Forgot Password?</a>
    <br><br>
    <a href="/registration.html">New user? Register yourself</a>

    </div>

    <script>
        let mediaRecorder
        let audioChunks = []
        let audioBlob
        let selectedDeviceId = null

        const startBtn = document.getElementById('start')
        const rerecordBtn = document.getElementById('rerecord')
        const loginBtn = document.getElementById('login')
        const preview = document.getElementById('preview')
        const usernameInput = document.getElementById('username')
        const checkBtn = document.getElementById('check')
        const statusText = document.getElementById('status')
        const micSelect = document.getElementById('micSelect')

        //Loading available microphones
        async function loadMics(){
            try{
                await navigator.mediaDevices.getUserMedia({ audio: true })

                const devices = await navigator.mediaDevices.enumerateDevices()

                const mics = devices.filter(d => d.kind === "audioinput")

                micSelect.innerHTML = ""

                mics.forEach((mic, index) => {
                    const option = document.createElement("option")
                    option.value = mic.deviceId
                    option.text = mic.label || `Microphone ${index + 1}`
                    micSelect.appendChild(option)
            })

        selectedDeviceId = micSelect.value
            } catch(err){
                console.error(err)
                statusText.innerText = "Microphone permission denied!"
            }
        }

        //Updating the selected mic
        micSelect.onchange = ()=>{
            selectedDeviceId = micSelect.value
        }

        function resetRecording() {
            audioBlob = null
            audioChunks = []
            preview.src = ""
            loginBtn.disabled = true
        }

        checkBtn.onclick = async () =>{
            const username = usernameInput.value.trim()

            if(!username){
                alert("Enter username!")
                return
            }

            const res = await fetch("http://localhost:3000/check-user", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username})
            })

            const text = await res.text()
            statusText.innerText = text

            if(text.includes("exists")){
                startBtn.disabled = false
            } else{
                startBtn.disabled = true
            }
        }

        startBtn.onclick = async () =>{
            
        resetRecording()

            //Enhanced audio constraints
            const stream = await navigator.mediaDevices.getUserMedia({
                audio:{
                    deviceId: selectedDeviceId ? {exact: selectedDeviceId}: undefined,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            })

            mediaRecorder = new MediaRecorder(stream)

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data)

        mediaRecorder.onstop = () =>{
            audioBlob = new Blob(audioChunks, {type: 'audio/wav'})
            preview.src = URL.createObjectURL(audioBlob)
            loginBtn.disabled = false
            rerecordBtn.disabled = false
            startBtn.disabled = false
        }

        mediaRecorder.start()
        startBtn.disabled = true
        rerecordBtn.disabled = true

        setTimeout(()=>{
            if(mediaRecorder.state !== 'inactive'){
                mediaRecorder.stop()
            }
        }, 2000)
    }

    rerecordBtn.onclick = () => {
        resetRecording()
        rerecordBtn.disabled = true
    }

    loginBtn.onclick = async() =>{
        console.log("clicked");
        const fd = new FormData()
        fd.append('audio', audioBlob, 'login.wav')
        fd.append('username', usernameInput.value)

        const res = await fetch("http://127.0.0.1:8000/match", {
            method: "POST",
            body: fd
        })

        const data = await res.json()
        console.log(data)
        alert(data.result)
    }

    loadMics()
    </script>
</body>
</html>
